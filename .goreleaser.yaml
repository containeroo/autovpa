---
project_name: AutoVPA
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: autovpa
    main: ./cmd/main.go
    binary: autovpa
    env: [CGO_ENABLED=0]
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.Version={{ .Tag }}
      - -X main.Commit={{ .FullCommit }}

dockers_v2:
  - id: autovpa
    ids:
      - autovpa
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: " Kubernetes operator that automatically keeps a matching VerticalPodAutoscaler in sync when workloads opt in via annotation."
      org.opencontainers.image.licenses: "Apache 2.0"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "https://github.com/containeroo/autovpa"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.url: "https://github.com/containeroo/autovpa"
      org.opencontainers.image.version: "{{ .Tag }}"
    dockerfile: Dockerfile.goreleaser
    images:
      - ghcr.io/containeroo/autovpa
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
